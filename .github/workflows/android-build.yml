name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Create isolated Capacitor project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      - name: Disable Jetifier and stabilize Android Gradle properties
        run: |
          cd mobile/android

          if [ -f gradle.properties ]; then
            sed -i '/android.enableJetifier/d' gradle.properties
            sed -i '/android.useAndroidX/d' gradle.properties
            sed -i '/org.gradle.jvmargs/d' gradle.properties
            sed -i '/org.gradle.parallel/d' gradle.properties
            sed -i '/org.gradle.configureondemand/d' gradle.properties
          else
            touch gradle.properties
          fi

          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=false" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.configureondemand=false" >> gradle.properties

          echo "----- mobile/android/gradle.properties -----"
          cat gradle.properties

      - name: Create BouncyCastle resolution script safely
        run: |
          cd mobile

          printf '%s\n' \
            'buildscript {' \
            '    configurations.classpath {' \
            '        resolutionStrategy.eachDependency { details ->' \
            '            if (details.requested.group == "org.bouncycastle") {' \
            '                if (details.requested.name == "bcprov-jdk18on") {' \
            '                    details.useVersion "1.77"' \
            '                    details.because "Avoid Java 21 multi-release classes in BouncyCastle during Gradle buildscript instrumentation"' \
            '                }' \
            '                if (details.requested.name == "bcpkix-jdk18on") {' \
            '                    details.useVersion "1.77"' \
            '                    details.because "Keep BouncyCastle components aligned"' \
            '                }' \
            '                if (details.requested.name == "bcutil-jdk18on") {' \
            '                    details.useVersion "1.77"' \
            '                    details.because "Keep BouncyCastle components aligned"' \
            '                }' \
            '            }' \
            '        }' \
            '    }' \
            '}' \
            > /tmp/bouncycastle-resolution.gradle

          echo "----- /tmp/bouncycastle-resolution.gradle -----"
          cat /tmp/bouncycastle-resolution.gradle

      - name: Inject BouncyCastle resolution into Gradle files
        run: |
          cd mobile

          for f in android/build.gradle android/app/build.gradle node_modules/@capacitor/android/capacitor/build.gradle
          do
            if [ -f "$f" ]; then
              echo "Patching $f"
              tmpfile=$(mktemp)
              cat /tmp/bouncycastle-resolution.gradle "$f" > "$tmpfile"
              mv "$tmpfile" "$f"
            else
              echo "File not found, skipped: $f"
            fi
          done

          echo "----- Confirm BouncyCastle patch -----"
          grep -R "Avoid Java 21" -n android node_modules/@capacitor/android || true

      - name: Patch Android Gradle Plugin version
        run: |
          cd mobile/android

          for file in $(find . -name "build.gradle" -o -name "settings.gradle" -o -name "build.gradle.kts" -o -name "settings.gradle.kts")
          do
            echo "Checking $file"

            sed -i -E 's/com\.android\.tools\.build:gradle:[0-9.]+/com.android.tools.build:gradle:8.3.2/g' "$file"

            sed -i -E 's/id\("com\.android\.application"\)[[:space:]]+version[[:space:]]+"[0-9.]+"/id("com.android.application") version "8.3.2"/g' "$file"

            sed -i -E "s/id 'com\.android\.application' version '[0-9.]+'/id 'com.android.application' version '8.3.2'/g" "$file"
          done

          echo "----- Gradle files after AGP patch -----"
          find . -maxdepth 4 -type f \( -name "build.gradle" -o -name "settings.gradle" -o -name "build.gradle.kts" -o -name "settings.gradle.kts" \) -print

      - name: Replace Gradle wrapper safely
        run: |
          cd mobile/android

          mkdir -p gradle/wrapper

          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > gradle/wrapper/gradle-wrapper.properties

          echo "----- gradle-wrapper.properties -----"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          mkdir -p ~/.gradle

      - name: Build APK with Gradle 8.7
        run: |
          cd mobile/android

          echo "----- Java version -----"
          java -version

          echo "----- Gradle version -----"
          gradle --version

          echo "----- Build APK -----"
          gradle assembleDebug --no-daemon --stacktrace --no-build-cache --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
