name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install deps
        run: npm install

      - name: Write capacitor.config.json
        run: |
          node -e "
          require('fs').writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.dosco.labatailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            bundledWebRuntime: false,
            server: { androidScheme: 'http' },
            android: { allowMixedContent: true }
          }, null, 2));
          "
          rm -f capacitor.config.ts capacitor.config.js
          cat capacitor.config.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "HTML size: $(du -h dist/index.html | cut -f1)"

      - uses: android-actions/setup-android@v3

      # ✅ FIX CRITIQUE (ANDROID SDK 33)
      - name: Install Android SDK 33
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      - name: Add Android platform
        run: |
          [ ! -d android ] && npx cap add android || echo "exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch AndroidManifest
        run: |
          python3 - << 'PY'
          import re

          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              c = f.read()

          if 'largeHeap' not in c:
              c = re.sub(
                  r'(<application\b)',
                  r'\1 android:largeHeap="true" android:hardwareAccelerated="true"',
                  c, count=1
              )

          if 'INTERNET' not in c:
              c = c.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET"/>\n    <application'
              )

          with open(path, 'w') as f:
              f.write(c)

          print("AndroidManifest OK")
          PY

      - name: Write network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

      - name: Set version
        run: |
          G=android/app/build.gradle
          VC=$(date +%Y%m%d%H)
          sed -i "s/versionCode [0-9]*/versionCode $VC/" $G
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' $G
          echo "versionCode=$VC"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ✅ BUILD APK
      - name: Build unsigned release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      # ✅ SIGN APK
      - name: Create keystore and sign
        run: |
          set -e

          keytool -genkeypair \
            -keystore k.jks \
            -alias k \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Dosco2026 \
            -keypass Dosco2026 \
            -dname "CN=DOSCO,O=DOSCO,C=CM" \
            -storetype JKS \
            -noprompt

          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)

          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            find android/app/build/outputs
            exit 1
          fi

          BT=$(ls -d ${ANDROID_HOME}/build-tools/*/ | sort -V | tail -1)

          ${BT}zipalign -f -v -p 4 "$APK" aligned.apk

          ${BT}apksigner sign \
            --ks k.jks \
            --ks-key-alias k \
            --ks-pass pass:Dosco2026 \
            --key-pass pass:Dosco2026 \
            --out dosco.apk \
            aligned.apk

          ${BT}apksigner verify dosco.apk

      - name: Upload KEYSTORE
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-SAUVEGARDEZ
          path: k.jks
          retention-days: 90

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK
          path: dosco.apk
          retention-days: 30
