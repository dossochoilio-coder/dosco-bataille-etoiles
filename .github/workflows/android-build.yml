name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Supprimer configs TS/JS conflictuels
      - name: Clean Capacitor configs
        run: |
          rm -f capacitor.config.ts
          rm -f capacitor.config.js

      # Créer le config JSON directement dans le workflow
      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.dosco.bataille.etoiles",
            "appName": "DOSCO",
            "webDir": "dist",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true
            }
          }
          CAPEOF
          echo "capacitor.config.json créé:"
          cat capacitor.config.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "dist/index.html prêt"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Dossier android déjà présent"
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
