name: Build DOSCO APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      - name: Init + Add Android
        run: |
          npx cap init dosco com.dosco.game --web-dir=dist
          npx cap add android

      - name: Copy
        run: npx cap copy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
