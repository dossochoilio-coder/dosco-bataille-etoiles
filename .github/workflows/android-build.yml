name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Create Capacitor Android project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      - name: Patch Android Gradle configuration
        run: |
          cd mobile/android

          echo "----- Disable Jetifier and stabilize Gradle -----"

          if [ -f gradle.properties ]; then
            sed -i '/android.enableJetifier/d' gradle.properties
            sed -i '/android.useAndroidX/d' gradle.properties
            sed -i '/org.gradle.jvmargs/d' gradle.properties
          else
            touch gradle.properties
          fi

          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=false" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.configureondemand=false" >> gradle.properties

          echo "----- gradle.properties -----"
          cat gradle.properties

      - name: Patch Android Gradle Plugin version
        run: |
          cd mobile/android

          python3 - <<'PY'
          from pathlib import Path
          import re

          files = []
          for pattern in ["build.gradle", "settings.gradle", "build.gradle.kts", "settings.gradle.kts"]:
              files.extend(Path(".").rglob(pattern))

          for p in files:
              text = p.read_text()
              original = text

              text = re.sub(
                  r"com\.android\.tools\.build:gradle:[0-9.]+",
                  "com.android.tools.build:gradle:8.5.2",
                  text
              )

              text = re.sub(
                  r'id\("com\.android\.application"\)\s+version\s+"[0-9.]+"',
                  'id("com.android.application") version "8.5.2"',
                  text
              )

              text = re.sub(
                  r"id 'com\.android\.application' version '[0-9.]+'",
                  "id 'com.android.application' version '8.5.2'",
                  text
              )

              if text != original:
                  print(f"Patched {p}")
                  p.write_text(text)
          PY

          echo "----- Gradle files after patch -----"
          find . -maxdepth 3 -type f \( -name "build.gradle" -o -name "settings.gradle" -o -name "build.gradle.kts" -o -name "settings.gradle.kts" \) -print

      - name: Replace Gradle wrapper file for safety
        run: |
          cd mobile/android

          mkdir -p gradle/wrapper

          printf '%s\n' \
            "distributionBase=GRADLE_USER_HOME" \
            "distributionPath=wrapper/dists" \
            "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            "zipStoreBase=GRADLE_USER_HOME" \
            "zipStorePath=wrapper/dists" \
            > gradle/wrapper/gradle-wrapper.properties

          echo "----- gradle-wrapper.properties -----"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          mkdir -p ~/.gradle

      - name: Build APK with Gradle 8.7
        run: |
          cd mobile/android

          echo "----- Java version -----"
          java -version

          echo "----- Gradle version from GitHub Action -----"
          gradle --version

          echo "----- Important: this workflow must NOT use ./gradlew -----"
          echo "If the log shows gradle-8.2.1, another workflow or command is being executed."

          gradle assembleDebug --no-daemon --stacktrace --no-build-cache --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
