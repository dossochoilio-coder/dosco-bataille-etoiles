name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Create isolated Capacitor project
        run: |
          mkdir mobile
          cd mobile
          npm init -y

          npm install @capacitor/core@5.7.8 @capacitor/cli@5.7.8 @capacitor/android@5.7.8

          npx cap init dosco com.dosco.game --web-dir=www

          mkdir www
          cp -r ../dist/* www/

          npx cap add android

      - name: Disable Jetifier and stabilize Android Gradle properties
        run: |
          cd mobile/android

          if [ -f gradle.properties ]; then
            sed -i '/android.enableJetifier/d' gradle.properties
            sed -i '/android.useAndroidX/d' gradle.properties
            sed -i '/org.gradle.jvmargs/d' gradle.properties
            sed -i '/org.gradle.parallel/d' gradle.properties
            sed -i '/org.gradle.configureondemand/d' gradle.properties
          else
            touch gradle.properties
          fi

          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=false" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.configureondemand=false" >> gradle.properties

          echo "----- mobile/android/gradle.properties -----"
          cat gradle.properties

      - name: Force safe BouncyCastle version in all Gradle build scripts
        run: |
          cd mobile

          cat > /tmp/bouncycastle-resolution.gradle <<'EOF'
buildscript {
    configurations.classpath {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "org.bouncycastle") {
                if (details.requested.name == "bcprov-jdk18on") {
                    details.useVersion "1.77"
                    details.because "Avoid Java 21 multi-release classes in bcprov 1.78+ / 1.79 during Gradle buildscript instrumentation"
                }
                if (details.requested.name == "bcpkix-jdk18on") {
                    details.useVersion "1.77"
                    details.because "Keep BouncyCastle components aligned"
                }
                if (details.requested.name == "bcutil-jdk18on") {
                    details.useVersion "1.77"
                    details.because "Keep BouncyCastle components aligned"
                }
            }
        }
    }
}
EOF

          for f in \
            android/build.gradle \
            android/app/build.gradle \
            node_modules/@capacitor/android/capacitor/build.gradle
          do
            if [ -f "$f" ]; then
              echo "Patching $f"
              cat /tmp/bouncycastle-resolution.gradle "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
            fi
          done

          echo "----- Confirm patched files -----"
          grep -R "bcprov-jdk18on" -n android node_modules/@capacitor/android || true
          grep -R "BouncyCastle" -n android node_modules/@capacitor/android || true

      - name: Patch Android Gradle Plugin to stable version
        run: |
          cd mobile/android

          python3 - <<'PY'
          from pathlib import Path
          import re

          targets = []
          for pattern in ["build.gradle", "settings.gradle", "build.gradle.kts", "settings.gradle.kts"]:
              targets.extend(Path(".").rglob(pattern))

          for p in targets:
              text = p.read_text()
              original = text

              text = re.sub(
                  r"com\.android\.tools\.build:gradle:[0-9.]+",
                  "com.android.tools.build:gradle:8.3.2",
                  text
              )

              text = re.sub(
                  r'id\("com\.android\.application"\)\s+version\s+"[0-9.]+"',
                  'id("com.android.application") version "8.3.2"',
                  text
              )

              text = re.sub(
                  r"id 'com\.android\.application' version '[0-9.]+'",
                  "id 'com.android.application' version '8.3.2'",
                  text
              )

              if text != original:
                  print(f"Patched {p}")
                  p.write_text(text)
          PY

      - name: Replace Gradle wrapper file for safety
        run: |
          cd mobile/android

          mkdir -p gradle/wrapper

          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          echo "----- gradle-wrapper.properties -----"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Clean Gradle caches
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/daemon
          rm -rf ~/.gradle/native
          mkdir -p ~/.gradle

      - name: Build APK with Gradle 8.7
        run: |
          cd mobile/android

          echo "----- Java version -----"
          java -version

          echo "----- Gradle version -----"
          gradle --version

          echo "----- Check that we are NOT using ./gradlew -----"

          gradle assembleDebug --no-daemon --stacktrace --no-build-cache --warning-mode all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
