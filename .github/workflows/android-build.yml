name: Build DOSCO AAB (Play Store Ready)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Clean Capacitor configs
        run: |
          rm -f capacitor.config.ts
          rm -f capacitor.config.js

      - name: Create capacitor.config.json
        run: |
          printf '{"appId":"com.dosco.labatailledesetoiles","appName":"DOSCO","webDir":"dist","bundledWebRuntime":false,"android":{"allowMixedContent":true},"plugins":{"SplashScreen":{"launchShowDuration":2000,"backgroundColor":"#03040a","showSpinner":false}}}' > capacitor.config.json
          cat capacitor.config.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "dist/index.html: $(wc -c < dist/index.html) bytes"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ existe deja"
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Configure network security
        run: |
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficPermitted="true"><trust-anchors><certificates src="system"/></trust-anchors></base-config><domain-config cleartextTrafficPermitted="true"><domain includeSubdomains="true">localhost</domain><domain includeSubdomains="true">capacitor.localhost</domain><domain includeSubdomains="true">dosco-backend-production.up.railway.app</domain></domain-config></network-security-config>' \
            > android/app/src/main/res/xml/network_security_config.xml

      - name: Add monetization dependencies
        run: |
          GRADLE_FILE="android/app/build.gradle"
          grep -q "billing" "$GRADLE_FILE" || \
            sed -i '/dependencies {/a\    implementation "com.android.billingclient:billing:6.0.1"' "$GRADLE_FILE" || true
          grep -q "play-services-ads" "$GRADLE_FILE" || \
            sed -i '/dependencies {/a\    implementation "com.google.android.gms:play-services-ads:22.6.0"' "$GRADLE_FILE" || true

      - name: Set app version
        run: |
          GRADLE_FILE="android/app/build.gradle"
          VERSION_CODE=$(date +%Y%m%d%H)
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" "$GRADLE_FILE" || true
          sed -i "s/versionName .*/versionName \"1.0.0\"/" "$GRADLE_FILE" || true
          echo "Version 1.0.0 - code $VERSION_CODE"

      - name: Create upload keystore
        run: |
          keytool -genkeypair -v \
            -keystore dosco-upload.keystore \
            -alias doscokey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass doscoUpload2026 \
            -keypass doscoUpload2026 \
            -dname "CN=DOSCO Game, OU=Mobile, O=Dosco, L=Yaounde, S=Centre, C=CM"
          echo "Keystore cree:"
          keytool -list -keystore dosco-upload.keystore -storepass doscoUpload2026

      - name: Write keystore.properties
        run: |
          KEYSTORE_PATH="$(pwd)/dosco-upload.keystore"
          printf 'storeFile=%s\nstorePassword=doscoUpload2026\nkeyAlias=doscokey\nkeyPassword=doscoUpload2026\n' \
            "$KEYSTORE_PATH" > android/keystore.properties
          echo "keystore.properties:"
          cat android/keystore.properties

      - name: Configure signing via keystore.properties
        run: |
          GRADLE_FILE="android/app/build.gradle"
          # Ajouter la lecture du keystore.properties en haut du fichier
          PROPS_BLOCK='def keystorePropertiesFile = rootProject.file("keystore.properties")\ndef keystoreProperties = new Properties()\nif (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }\n'
          sed -i "1s|^|${PROPS_BLOCK}|" "$GRADLE_FILE"
          # Ajouter signingConfig dans android {}
          python3 - << 'PYEOF'
          import re
          with open("android/app/build.gradle", "r") as f:
              content = f.read()
          signing_block = """
              signingConfigs {
                  release {
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                  }
              }
          """
          release_signing = "signingConfig signingConfigs.release"
          # Insérer signingConfigs avant buildTypes
          content = content.replace("buildTypes {", signing_block + "\n    buildTypes {", 1)
          # Ajouter signingConfig dans release buildType
          content = re.sub(
              r'(release \{)',
              r'\1\n            ' + release_signing,
              content, count=1
          )
          with open("android/app/build.gradle", "w") as f:
              f.write(content)
          print("build.gradle configure avec succes")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release AAB
        run: cd android && ./gradlew bundleRelease --stacktrace

      - name: Build Release APK
        if: success()
        run: cd android && ./gradlew assembleRelease --stacktrace

      - name: List build outputs
        if: always()
        run: |
          find android/app/build/outputs -name "*.aab" -o -name "*.apk" 2>/dev/null | while read f; do
            echo "$(du -h $f | cut -f1)  $f"
          done

      - name: Upload keystore SAUVEGARDEZ CE FICHIER
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: KEYSTORE-SAUVEGARDEZ
          path: dosco-upload.keystore
          retention-days: 90

      - name: Upload AAB Play Store
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dosco-release-aab-playstore
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK signe
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dosco-release-apk-signe
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
