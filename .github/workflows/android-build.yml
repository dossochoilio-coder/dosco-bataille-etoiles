name: Build DOSCO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install npm deps
        run: npm install

      - name: Remove conflicting Capacitor configs
        run: rm -f capacitor.config.ts capacitor.config.js

      - name: Write capacitor.config.json
        run: |
          node -e "
          const fs = require('fs');
          fs.writeFileSync('capacitor.config.json', JSON.stringify({
            appId: 'com.dosco.labatailledesetoiles',
            appName: 'DOSCO',
            webDir: 'dist',
            bundledWebRuntime: false,
            android: { allowMixedContent: true },
            plugins: {
              SplashScreen: {
                launchShowDuration: 2000,
                backgroundColor: '#03040a',
                showSpinner: false
              }
            }
          }, null, 2));
          console.log('capacitor.config.json written');
          "

      - name: Prepare web assets
        run: |
          mkdir -p dist
          cp DOSCO_Standalone.html dist/index.html
          echo "dist size: $(du -sh dist/index.html)"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: |
          [ ! -d android ] && npx cap add android || echo "android/ already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Write network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          node -e "
          const fs = require('fs');
          const xml = \`<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted=\"true\">
              <trust-anchors><certificates src=\"system\"/></trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted=\"true\">
              <domain includeSubdomains=\"true\">localhost</domain>
              <domain includeSubdomains=\"true\">capacitor.localhost</domain>
              <domain includeSubdomains=\"true\">dosco-backend-production.up.railway.app</domain>
            </domain-config>
          </network-security-config>\`;
          fs.writeFileSync('android/app/src/main/res/xml/network_security_config.xml', xml);
          console.log('network_security_config.xml written');
          "

      - name: Add billing and ads dependencies
        run: |
          GRADLE=android/app/build.gradle
          grep -q 'billingclient' "$GRADLE" || \
            sed -i '/^dependencies {/a\    implementation "com.android.billingclient:billing:6.0.1"' "$GRADLE"
          grep -q 'play-services-ads' "$GRADLE" || \
            sed -i '/^dependencies {/a\    implementation "com.google.android.gms:play-services-ads:22.6.0"' "$GRADLE"

      - name: Set version code and name
        run: |
          GRADLE=android/app/build.gradle
          VC=$(date +%Y%m%d%H)
          sed -i "s/versionCode [0-9]*/versionCode $VC/" "$GRADLE"
          sed -i 's/versionName "[^"]*"/versionName "1.0.0"/' "$GRADLE"
          echo "versionCode=$VC"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build unsigned release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="" \
            -Pandroid.injected.signing.key.alias="" \
            --stacktrace 2>&1 | tail -50
          # Trouver l'APK non signe
          find . -name "*.apk" -path "*/release/*" | head -5

      - name: Create keystore and sign APK
        run: |
          # 1. Creer le keystore
          keytool -genkeypair \
            -keystore upload.keystore \
            -alias doscokey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Dosco2026Upload \
            -keypass Dosco2026Upload \
            -dname "CN=DOSCO,OU=Game,O=DOSCO,L=Yaounde,S=Centre,C=CM" \
            -storetype JKS
          echo "Keystore created"
          keytool -list -v -keystore upload.keystore -storepass Dosco2026Upload 2>&1 | grep -E "Alias|Valid"

          # 2. Trouver l'APK non signe
          APK_UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK to sign: $APK_UNSIGNED"

          # 3. Zipalign (obligatoire avant signature)
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/zipalign \
            -v -p 4 "$APK_UNSIGNED" dosco-aligned.apk

          # 4. Signer avec apksigner
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner sign \
            --ks upload.keystore \
            --ks-key-alias doscokey \
            --ks-pass pass:Dosco2026Upload \
            --key-pass pass:Dosco2026Upload \
            --out dosco-release-signed.apk \
            dosco-aligned.apk

          # 5. Verifier la signature
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)/apksigner verify \
            --verbose dosco-release-signed.apk 2>&1 | head -10

          echo "APK signe: $(du -h dosco-release-signed.apk | cut -f1)"

      - name: Upload keystore - SAUVEGARDEZ CE FICHIER
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: KEYSTORE-upload-SAUVEGARDEZ
          path: upload.keystore
          retention-days: 90

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-release-signed-apk
          path: dosco-release-signed.apk
          retention-days: 30
