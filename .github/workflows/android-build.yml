name: Build DOSCO APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Create Capacitor project
        run: |
          mkdir mobile
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init dosco com.dosco.game --web-dir=www
          mkdir www
          cp -r ../dist/* www/
          npx cap add android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ 🔥 SOLUTION DÉCISIVE
      - name: Replace Gradle wrapper completely
        run: |
          cd mobile/android/gradle/wrapper

          rm -f gradle-wrapper.properties

          echo "distributionBase=GRADLE_USER_HOME" >> gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle-wrapper.properties
          echo "distributionUrl=https://services.gradle.org/distributions/gradle-8.7-bin.zip" >> gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle-wrapper.properties

          echo "✅ NEW GRADLE FILE:"
          cat gradle-wrapper.properties

      # ✅ clean environnement
      - name: Clean Gradle cache
        run: rm -rf ~/.gradle

      - name: Build APK
        run: |
          cd mobile/android
          chmod +x gradlew

          echo "👉 VERSION GRADLE"
          ./gradlew --version

          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
